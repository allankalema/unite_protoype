<div id="alert-{{ alert_id }}" class="relative mb-3 p-4 pr-11 rounded-xl border transition-all duration-200 shadow-sm
    {% if level == 'success' %}bg-emerald-50 border-emerald-200 text-emerald-800{% endif %}
    {% if level == 'error' %}bg-rose-50 border-rose-200 text-rose-800{% endif %}
    {% if level == 'warning' %}bg-amber-50 border-amber-200 text-amber-900{% endif %}
    {% if level == 'info' %}bg-blue-50 border-blue-200 text-blue-900{% endif %}">
    <div class="flex items-start gap-3">
        <div class="mt-0.5">
            {% if level == 'success' %}<i class="fa-solid fa-circle-check"></i>{% endif %}
            {% if level == 'error' %}<i class="fa-solid fa-circle-xmark"></i>{% endif %}
            {% if level == 'warning' %}<i class="fa-solid fa-triangle-exclamation"></i>{% endif %}
            {% if level == 'info' %}<i class="fa-solid fa-circle-info"></i>{% endif %}
        </div>
        <p class="text-sm leading-6">{{ text }}</p>
    </div>
    <button type="button" aria-label="Dismiss alert" data-dismiss-target="#alert-{{ alert_id }}" class="absolute right-3 top-3 text-slate-500 hover:text-slate-900 transition-colors">
        <i class="fa-solid fa-xmark"></i>
    </button>
</div>
