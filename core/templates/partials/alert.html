<div id="alert-{{ alert_id }}" class="relative p-4 pr-11 rounded-xl border transition-all duration-200 shadow-lg
    {% if level == 'success' %}bg-white border-success text-success{% endif %}
    {% if level == 'error' %}bg-white border-error text-error{% endif %}
    {% if level == 'warning' %}bg-white border-warning text-warning{% endif %}
    {% if level == 'info' %}bg-unite-blue-100 border-unite-blue-500 text-unite-blue-600{% endif %}">
    <div class="flex items-start gap-3">
        <div class="mt-0.5">
            {% if level == 'success' %}<i class="fa-solid fa-circle-check"></i>{% endif %}
            {% if level == 'error' %}<i class="fa-solid fa-circle-xmark"></i>{% endif %}
            {% if level == 'warning' %}<i class="fa-solid fa-triangle-exclamation"></i>{% endif %}
            {% if level == 'info' %}<i class="fa-solid fa-circle-info"></i>{% endif %}
        </div>
        <p class="text-sm leading-6">{{ text }}</p>
    </div>
    <button type="button" aria-label="Dismiss alert" data-dismiss-target="#alert-{{ alert_id }}" class="absolute right-3 top-3 text-unite-text-main hover:text-unite-navy-500 transition-colors">
        <i class="fa-solid fa-xmark"></i>
    </button>
</div>
