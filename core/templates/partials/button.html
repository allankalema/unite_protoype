{% if href %}
<a href="{{ href }}" class="inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl font-semibold transition-all
    {% if variant == 'primary' %}bg-unite-orange-500 hover:bg-unite-orange-600 text-white{% endif %}
    {% if variant == 'secondary' %}bg-unite-blue-500 hover:bg-unite-blue-600 text-white{% endif %}
    {% if variant == 'ghost' %}bg-unite-gray-100 text-unite-navy-500 hover:bg-unite-gray-300{% endif %}
    {% if full %}w-full{% endif %}">
    {% if icon %}<i class="{{ icon }}"></i>{% endif %}{{ label }}
</a>
{% else %}
<button type="{{ type|default:'button' }}" {% if loading %}data-loading="1"{% endif %} class="inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl font-semibold transition-all disabled:opacity-60
    {% if variant == 'primary' %}bg-unite-orange-500 hover:bg-unite-orange-600 text-white{% endif %}
    {% if variant == 'secondary' %}bg-unite-blue-500 hover:bg-unite-blue-600 text-white{% endif %}
    {% if variant == 'ghost' %}bg-unite-gray-100 text-unite-navy-500 hover:bg-unite-gray-300{% endif %}
    {% if full %}w-full{% endif %}">
    {% if icon %}<i class="{{ icon }}"></i>{% endif %}{{ label }}
</button>
{% endif %}
