<section class="bg-white border border-unite-gray-300 rounded-2xl shadow-sm {{ class_name }}">
    {% if title %}
        <header class="px-6 pt-5">
            <h3 class="text-lg font-semibold text-unite-navy-500">{{ title }}</h3>
            {% if subtitle %}<p class="text-sm text-unite-text-main mt-1">{{ subtitle }}</p>{% endif %}
        </header>
    {% endif %}
    <div class="p-6 {% if title %}pt-4{% endif %}">
        {{ body|safe }}
    </div>
</section>
