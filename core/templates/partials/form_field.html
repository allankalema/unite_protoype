<div class="space-y-1.5">
    <label for="{{ field.id_for_label }}" class="text-sm font-semibold text-unite-navy">
        {{ field.label }}
        {% if field.field.required %}<span class="text-rose-600">*</span>{% endif %}
    </label>
    {{ field }}
    {% if field.help_text %}
        <p class="text-xs text-slate-500">{{ field.help_text }}</p>
    {% endif %}
    {% if field.errors %}
        <ul class="text-xs text-rose-700 space-y-1">
            {% for err in field.errors %}
                <li>{{ err }}</li>
            {% endfor %}
        </ul>
    {% endif %}
</div>
