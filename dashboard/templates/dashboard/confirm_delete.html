{% extends 'base.html' %}
{% block title %}Confirm Delete{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto px-4 py-12">
    <div class="bg-white border rounded-xl p-6">
        <h1 class="text-xl font-bold">Confirm Delete</h1>
        <p class="mt-2 text-slate-600">Are you sure you want to delete: <strong>{{ item }}</strong>?</p>
        <form method="post" class="mt-5 flex gap-3">
            {% csrf_token %}
            <button class="bg-rose-600 text-white px-4 py-2 rounded-lg" type="submit">Yes, Delete</button>
            <a class="bg-slate-200 px-4 py-2 rounded-lg" href="{% url back_url %}">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
