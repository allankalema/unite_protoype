{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto px-4 py-10">
    <div class="bg-white border border-unite-gray-300 rounded-2xl p-6">
        <h1 class="text-2xl font-bold mb-5 text-unite-navy-500">{{ title }}</h1>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {% for field in form %}
                {% include 'partials/form_field.html' with field=field %}
            {% endfor %}
            <button class="bg-unite-orange-500 hover:bg-unite-orange-600 text-white px-5 py-2.5 rounded-xl font-semibold " type="submit" data-loading="1">Save</button>
        </form>
    </div>
</div>
{% endblock %}
